# =============================================================================
# Naukri Job Collector — CSS Selectors
# =============================================================================
# All selectors used for scraping. Update these when Naukri changes its DOM.
# Never hardcode selectors in application code.

login:
  # Selectors that indicate the user is on the login page
  detection: "form.login-form, div.login-layer, input[placeholder='Enter your active Email ID / Username']"
  # Selectors that indicate the user is logged in
  logged_in: "div.nI-gNb-drawer, a[href*='mnjuser/profile'], div.user-info"
  # Selectors for positive authentication — only visible for logged-in users
  authenticated:
    "div.nI-gNb-drawer, a[href*='mnjuser/profile'], div.user-info, \
     img[alt*='profile'], span[class*='user-name'], a[href*='logout'], \
     div[class*='userJumper'], a[href*='recruiter'], div[class*='profile-avatar']"

search_results:
  # Container holding all job cards
  container: "div.list, div.styles_jlc__main__VdwtF"
  # Individual job card element
  job_card: "article.jobTuple, div.srp-jobtuple-wrapper, div.cust-job-tuple"
  # Job title link within a card
  title: "a.title, a.title-href, a[class*='title']"
  # Company name within a card
  company: "a.subTitle, a.comp-name, span.comp-name"
  # Experience within a card
  experience: "span.expwdth, li.experience span, span[class*='experience']"
  # Location within a card
  location: "span.locWdth, li.location span, span[class*='location']"
  # Posted date within a card
  posted_date: "span.job-post-day, span[class*='job-post-day'], span.date"
  # No results indicator
  no_results: "div.no-result, div.styles_no-result__a3Wxx"

pagination:
  # Next page button
  next_button: "a.fright.fs14.btn-secondary.br2, a[class*='styles_btn-secondary'], a.btn-secondary"
  # Current page indicator
  current_page: "a.selected, a[class*='selected']"

job_detail:
  # Full job description on detail page
  description: "div.job-desc, section.job-desc, div[class*='job-desc'], div.styles_JDC__dang-inner-html__h0K4t"
  # Apply button / URL
  apply_button: "button#apply-button, button.apply-button, a#apply-button, div.apply-btn button"
  # Recruiter info section
  recruiter_section: "div.rec-info, div[class*='rec-info'], section.rec-details"
  recruiter_name: "div.rec-name, span.rec-name, div[class*='rec-name']"
  recruiter_email: "div.rec-email, span.rec-email, a[href^='mailto:']"

discovery:
  apply_flow:
    trigger: "button:has-text('Apply'), a:has-text('Apply'), button:has-text('Quick Apply'), a:has-text('Quick Apply'), button:has-text('Easy Apply'), a:has-text('Easy Apply'), button:has-text('Apply on company site'), a:has-text('Apply on company site'), button[class*='apply'], a[class*='apply'], [role='button']:has-text('Apply')"
    already_applied: "#already-applied, .already-applied, span[class*='already-applied'], [id*='already-applied'], button:has-text('Already Applied'), span:has-text('Already Applied')"
    easy_apply_marker: "text=Easy Apply, text=Quick Apply, div.easy-apply, section.easy-apply, button:has-text('Easy Apply'), .chatbot_Drawer, .chatbot_Overlay, .modal, .modal-dialog, [class*='chatbot'], [class*='modal'], [class*='popup'], [class*='drawer'], [class*='dialog'], [class*='overlay']"
    external_portal_marker: "text=Apply on company site, text=External Application, text=Go to company site"
    email_link: "a[href^='mailto:'], text=@"
    final_submit: "button:has-text('Submit Application'), button:has-text('Confirm Application'), button:has-text('Apply Now')"
  questions:
    page_body: "body"
    container: "div[class*='question'], section[class*='question'], div[class*='form-field'], li[class*='question'], fieldset, li[class*='botItem'], div[class*='botMsg'], div[class*='chatbot']"
    text: "label, span[class*='question'], div[class*='question-text'], p[class*='question'], div[class*='botMsg'] span, div[class*='botMsg']"
    field: "input, textarea, select, [role='radio'], [role='radiogroup'], [contenteditable='true']"
    option: "label, option, button, [role='radio']"
    required_marker: "[required], [aria-required='true']"
