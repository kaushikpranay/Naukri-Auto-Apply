# =============================================================================
# Naukri Job Collector — Global Settings
# =============================================================================

browser:
  headless: false
  profile_dir: "browser_profile"
  slow_mo: 500                    # milliseconds between actions
  default_timeout: 30000            # milliseconds (30s — prevents silent multi-minute hangs)
  viewport_width: 1280
  viewport_height: 720

paths:
  database: "database/jobs.db"
  exports: "exports"
  logs: "logs"
  screenshots: "screenshots"
  artifacts: "artifacts"

naukri:
  base_url: "https://www.naukri.com"
  search_url_template: "https://www.naukri.com/{keyword}-jobs-in-{location}?k={keyword_raw}"
  results_per_page: 20
  max_pages_per_search: 5         # safety cap per keyword-location combo
  page_load_wait: 3000            # ms to wait after page navigation
  detail_load_wait: 2000          # ms to wait after opening job detail

logging:
  level: "INFO"
  rotation: "10 MB"
  retention: "30 days"
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level:<8} | {module}:{function}:{line} | {message}"

evaluation:
  max_ai_evaluations_per_run: 25
  max_retry_count: 3

discovery:
  max_discovery_jobs_per_run: 10
