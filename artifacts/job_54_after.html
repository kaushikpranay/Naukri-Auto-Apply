    <meta name="description" property="og:description" content="Adobe Firefly Gen AI Models and services group is looking for a Firefly models &amp;amp; Services architect interested in working on generative AI models for image, vector, audio, video and multimodal to help us build the next generation of foundation models that power Adobe creative tools. We are looking for a passionate architect with deep machine learning expertise who can contribute to building, optimizing and deploying model pipelines to be used by Adobe’s innovative and Industry leading products in imaging, 3D, vector and Audio/Video domains. As a Firefly model architect, you will join an outstanding team of ML and service engineers building the future of digital experiences. You will help set long-term technical strategy and work across multiple Adobe teams to architect the pipelines of the future foundation models at Adobe. You will be empowered to make meaningful architecture decisions and prioritize model optimization experiments. You will have the opportunity to develop novel ideas to advance the creativity world through features in Adobe's products and reach millions of people worldwide! Job Responsibilities Help architect and optimize large-scale foundation model pipelines in Generative AI Design and develop the GenAI backend services for Firefly, creating GPU optimized, efficient model pipelines that power the generative AI features on Firefly website, PPro, Photoshop, Illustrator, Express, Stock and other applications/surfaces Collaborate with outstanding Applied researchers and engineers to bring ideas to production Provide technical leadership and mentorship for junior team members. Explore and research new and emerging ML and MLOps technologies to continuously improve Adobe`s GenAI engineering effectiveness and efficiency Review and provide feedback on features, technology, architecture, designs and test strategies. What you'll need to succeed Masters or Ph.D. in Computer Science, AI/ML or related fields or B.Tech and strong experience in AI/ML. 10+ years of experience 3+ years as a Lead/Architect Excellent communication and technical leadership skill. Experience in tech leading large number of contributors on time sensitive and business critical GenAI projects. Experience in state-of-the-art Generative AI technologies, such as GAN, diffusion, transformer models Strong hands-on experience with large-scale GenAI model pipelines and/or shipping ML features Strong collaboration skill. Experience with working in a Matrix organization, driving alignment, drawing conclusions and getting things done Preferred experience: Experience training or optimizing models. (CUDA, Triton, TRT, AOT) Experience converting models from various frameworks like PyTorch and TensorFlow to other target formats, to ensure compatibility and optimized performance across different platforms Good publication record in Computer Science, AI/ML or related fields About Adobe Adobe empowers everyone to create through innovative platforms and tools that unleash creativity, productivity and personalized customer experiences. Adobe’s industry-leading offerings including Adobe Acrobat Studio, Adobe Express, Adobe Firefly, Creative Cloud, Adobe Experience Platform, Adobe Experience Manager, and GenStudio enable people and businesses to turn ideas into impact, powered by AI and driven by human ingenuity. Our 30,000+ employees worldwide are creating the future and raising the bar as we drive the next decade of growth. We’re on a mission to hire the very best and believe in creating a company culture where all employees are empowered to make an impact. At Adobe, we believe that great ideas can come from anywhere in the organization. The next big idea could be yours. Let’s Adobe together At Adobe, we believe in creating a company culture where all employees are empowered to make an impact. Learn more about Adobe life, including our values and culture, focus on people, purpose and community, Adobe for All, comprehensive benefits programs, the stories we tell, the customers we serve, and how you can help us advance our mission of empowering everyone to create. Adobe is proud to be an Equal Employment Opportunity employer. We do not discriminate based on gender, race or color, ethnicity or national origin, age, disability, religion, sexual orientation, gender identity or expression, veteran status, or any other protected characteristic. Learn more. Adobe aims to make our Careers website and recruiting process accessible to any and all users. If you have a disability or special need that requires accommodation to navigate our website or complete the application process, email accommodations@adobe.com or call +1 408-536-3015. AI Use Guidelines for Interviews: Our interviews are designed to reflect your own skills and thinking. The use of AI or recording tools during live interviews is not permitted unless explicitly invited by the interviewer or approved in advance as part of a reasonable accommodation. If these tools are used inappropriately or in a way that misrepresents your work, your application may not move forward in the process. At Adobe, we empower employees to innovate with AI — and we look for candidates eager to do the same. As part of the hiring experience, we provide clear guidance on where AI is encouraged during the process and where it’s restricted during live interviews. See how we think about AI in the hiring experience. At Adobe, you will be immersed in an exceptional work environment that is recognized around the world. You will also be surrounded by colleagues who are committed to helping each other grow through our unique Check-In approach where ongoing feedback flows freely. If you’re looking to make an impact, Adobe's the place for you. Discover what our employees are saying about their career experiences on the Adobe Life blog and explore the meaningful benefits we offer. There's more than meets the eye when it comes to Adobe. Take the quiz and see how well you know us! Adobe is proud to be an Equal Employment Opportunity employer. We do not discriminate based on gender, race or color, ethnicity or national origin, age, disability, religion, sexual orientation, gender identity or expression, veteran status, or any other applicable characteristics protected by law. Learn more. Adobe aims to make Adobe.com accessible to any and all users. If you have a disability or special need that requires accommodation to navigate our website or complete the application process, email accommodations@adobe.com or call (408) 536-3015.">
